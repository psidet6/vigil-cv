<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务历史</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />
  <script src="{{ url_for('static', filename='shared/js/auth.js') }}"></script>
  <script>
    const STATUS_UI = {
      queued: { label: '排队中', badge: 'bg-slate-100 text-slate-700 ring-slate-200' },
      running: { label: '运行中', badge: 'bg-sky-100 text-sky-700 ring-sky-200' },
      done: { label: '已完成', badge: 'bg-emerald-100 text-emerald-700 ring-emerald-200' },
      error: { label: '失败', badge: 'bg-rose-100 text-rose-700 ring-rose-200' },
      canceled: { label: '已取消', badge: 'bg-slate-200 text-slate-700 ring-slate-300' },
      interrupted: { label: '已中断', badge: 'bg-amber-100 text-amber-700 ring-amber-200' }
    };

    function statusMeta(status) {
      return STATUS_UI[status] || STATUS_UI.running;
    }

    function modelDisplay(modelKey) {
      const map = {
        special: '专项场景专用',
        general: '通用 YOLOE',
      };
      return map[modelKey] || modelKey || '未知模型';
    }

    function sourceDisplay(item) {
      if (item.job_type === 'upload') {
        return item.source_type === 'video' ? '本地上传 / 视频' : '本地上传 / ZIP';
      }
      return '数据库检测 / PostgreSQL';
    }

    function identitySummaryText(summary) {
      if (!summary || !summary.recognized_asset_count) {
        return '<span class="text-slate-400">未执行身份识别</span>';
      }
      const parts = [
        '已识别 ' + (summary.recognized_asset_count || 0) + ' 张',
        '命中 ' + (summary.matched_asset_count || 0) + ' 张',
        '人脸 ' + (summary.total_face_count || 0) + ' 张'
      ];
      return '<span class="text-slate-700">' + parts.join(' / ') + '</span>';
    }

    function renderRows(items) {
      const body = document.getElementById('historyBody');
      const empty = document.getElementById('emptyState');

      if (!items || items.length === 0) {
        body.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      body.innerHTML = items.map(function (item) {
        const meta = statusMeta(item.status);
        const downloadHtml = item.status === 'done'
          ? '<a class="mr-btn mr-btn--ink" href="' + item.download_url + '" target="_blank">下载结果</a>'
          : '<span class="text-xs text-slate-400">暂无下载</span>';
        return (
          '<tr class="transition hover:bg-slate-50/80">' +
            '<td class="px-4 py-4 align-top">' +
              '<div class="font-mono text-xs text-slate-500">' + item.id + '</div>' +
              '<div class="mt-2 text-sm font-medium text-slate-700">' + (item.start_ts || '') + '</div>' +
              '<div class="mt-1 text-xs text-slate-400">' + sourceDisplay(item) + '</div>' +
            '</td>' +
            '<td class="px-4 py-4 align-top">' +
              '<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ring-1 ring-inset ' + meta.badge + '">' + meta.label + '</span>' +
              '<div class="mt-2 text-xs text-slate-400">' + (item.end_ts || '进行中') + '</div>' +
            '</td>' +
            '<td class="px-4 py-4 align-top">' +
              '<span class="inline-flex rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-700 ring-1 ring-inset ring-slate-200">' + modelDisplay(item.model_key) + '</span>' +
            '</td>' +
            '<td class="px-4 py-4 align-top text-sm font-medium text-slate-700">' + (item.kept || 0) + ' / ' + (item.total || 0) + '</td>' +
            '<td class="px-4 py-4 align-top text-sm text-slate-600">' + identitySummaryText(item.identity_summary) + '</td>' +
            '<td class="px-4 py-4 align-top">' +
              '<div class="flex flex-wrap items-center gap-2">' +
                '<a class="mr-btn mr-btn--ghost" href="' + item.detail_url + '">查看详情</a>' +
                downloadHtml +
              '</div>' +
            '</td>' +
          '</tr>'
        );
      }).join('');
    }

    function loadHistory() {
      fetch('{{ url_for("job.history") }}')
        .then(function (resp) { return resp.json(); })
        .then(function (data) {
          if (!data.ok) return;
          document.getElementById('historyCount').textContent = (data.jobs || []).length;
          renderRows(data.jobs || []);
        })
        .catch(function () {});
    }

    window.addEventListener('load', loadHistory);
  </script>
</head>
<body class="mr-editorial mr-history-page min-h-screen text-slate-900">
  <div class="mx-auto max-w-7xl px-4 py-6 md:px-6 md:py-10">
    <header class="mb-8 grid gap-4 xl:grid-cols-[1.5fr,0.9fr]">
      <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-8">
        <div class="text-xs font-semibold uppercase tracking-[0.35em] text-sky-600">History</div>
        <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900 md:text-4xl">任务历史</h1>
        <p class="mt-4 max-w-3xl text-sm leading-7 text-slate-600 md:text-base">
          这里展示系统已保存的全部检测任务历史。除了检测结果下载外，现在也会保留身份识别摘要，换浏览器、换终端或服务重启后都可以继续回看。
        </p>
      </section>

      <section class="rounded-[32px] border border-slate-200/70 bg-slate-900 p-6 text-white shadow-[0_24px_60px_rgba(15,23,42,0.18)]">
        <div class="text-xs font-semibold uppercase tracking-[0.35em] text-sky-200">Snapshot</div>
        <div class="mt-5 rounded-2xl border border-white/10 bg-white/5 p-4">
          <div class="text-sm text-slate-300">当前记录数</div>
          <div id="historyCount" class="mt-2 text-4xl font-semibold text-white">0</div>
        </div>
        <div class="mt-4 space-y-3">
          <a href="{{ url_for('job.index') }}" class="inline-flex w-full items-center justify-center rounded-full bg-white px-5 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-100">
            返回首页
          </a>
          <button type="button" onclick="loadHistory()" class="inline-flex w-full items-center justify-center rounded-full border border-white/20 bg-transparent px-5 py-3 text-sm font-semibold text-white transition hover:bg-white/10">
            刷新列表
          </button>
        </div>
      </section>
    </header>

    <section class="rounded-[32px] border border-white/70 bg-white/85 p-5 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-6">
      <div class="flex flex-col gap-3 border-b border-slate-100 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <div class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Records</div>
          <h2 class="mt-2 text-xl font-semibold text-slate-900">任务列表</h2>
        </div>
        <p class="text-sm leading-7 text-slate-500">支持数据库检测和本地上传检测两类任务；详情页可继续查看结果图和身份识别明细。</p>
      </div>

      <div class="mt-5 overflow-x-auto">
        <table class="min-w-full border-separate border-spacing-0">
          <thead>
            <tr class="text-left text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">
              <th class="px-4 py-3">任务</th>
              <th class="px-4 py-3">状态</th>
              <th class="px-4 py-3">模型</th>
              <th class="px-4 py-3">保留 / 总数</th>
              <th class="px-4 py-3">身份识别摘要</th>
              <th class="px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody id="historyBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>

      <div id="emptyState" class="mt-6 hidden rounded-3xl border border-dashed border-slate-200 bg-slate-50/80 px-4 py-10 text-center text-sm text-slate-500">
        暂无历史记录。
      </div>
    </section>
  </div>
</body>
</html>
